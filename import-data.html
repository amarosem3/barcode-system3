        // Function to import students
        window.importStudents = async function() {
            const statusDiv = document.getElementById('status');
            const resultDiv = document.getElementById('result');
            const btn = document.getElementById('importBtn');
            
            btn.disabled = true;
            statusDiv.innerHTML = '⏳ Importing...';
            resultDiv.innerHTML = '';
            
            let success = 0;
            let failed = 0;
            
            for (let i = 0; i < students.length; i++) {
                const student = students[i];
                try {
                    await db.collection('students').add({
                        ...student,
                        created_at: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    success++;
                    statusDiv.innerHTML = `⏳ Importing... ${i+1}/${students.length}`;
                } catch (error) {
                    console.error('Failed:', student, error);
                    failed++;
                }
            }
            
            btn.disabled = false;
            statusDiv.innerHTML = '✅ Import selesai!';
            resultDiv.innerHTML = `
                <div class="alert alert-success">
                    <strong>Berjaya:</strong> ${success} rekod<br>
                    <strong>Gagal:</strong> ${failed} rekod
                </div>
            `;
        };

        // Function to clear students collection
        window.clearStudents = async function() {
            if (!confirm('Padam SEMUA data students? Tindakan ini tak boleh dibatalkan.')) return;
            
            const statusDiv = document.getElementById('status');
            const btn = document.getElementById('clearBtn');
            
            btn.disabled = true;
            statusDiv.innerHTML = '⏳ Mengosongkan...';
            
            try {
                const snapshot = await db.collection('students').get();
                const batch = db.batch();
                
                snapshot.docs.forEach(doc => {
                    batch.delete(doc.ref);
                });
                
                await batch.commit();
                statusDiv.innerHTML = '✅ Semua data students telah dipadam';
            } catch (error) {
                console.error('Error clearing:', error);
                statusDiv.innerHTML = '❌ Error: ' + error.message;
            }
            
            btn.disabled = false;
        };
