<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ROLLCALL - Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0f1f;
            font-family: 'Inter', sans-serif;
            color: white;
            padding: 1rem;
        }
        .header {
            background: linear-gradient(135deg, #00f2fe, #4facfe);
            border-radius: 28px;
            padding: 1.2rem 1.5rem;
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .header h1 { font-size: 1.8rem; display: flex; align-items: center; gap: 0.5rem; }
        .nav-buttons { display: flex; gap: 0.8rem; }
        .btn {
            background: rgba(255,255,255,0.15);
            padding: 0.5rem 1rem;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-weight: 500;
        }
        .btn:hover { background: rgba(255,255,255,0.3); }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .card {
            background: rgba(20,27,43,0.8);
            border-radius: 24px;
            border: 1px solid #2a3442;
            padding: 1.5rem;
            text-align: center;
            transition: 0.2s;
            text-decoration: none;
            color: white;
        }
        .card:hover {
            border-color: #00f2fe;
            transform: translateY(-4px);
        }
        .card i { font-size: 2.5rem; margin-bottom: 0.5rem; color: #00f2fe; }
        .card h3 { margin-bottom: 0.5rem; }
        .card p { color: #a0a8c0; font-size: 0.85rem; }
    </style>
</head>
<body>
    <div class="header">
        <h1><i class="fas fa-user-shield"></i> Admin Dashboard</h1>
        <div class="nav-buttons">
            <button class="btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
        </div>
    </div>

    <div class="card-grid">
        <a href="lecturer_dashboard.html" class="card">
            <i class="fas fa-chalkboard-user"></i>
            <h3>Lecturer View</h3>
            <p>Lihat kehadiran mengikut kelas</p>
        </a>
        <a href="attendance_list.html" class="card">
            <i class="fas fa-list-ul"></i>
            <h3>Attendance Log</h3>
            <p>Senarai kehadiran kronologi</p>
        </a>
        <a href="register.html" class="card">
            <i class="fas fa-user-plus"></i>
            <h3>Register Lecturer</h3>
            <p>Tambah pensyarah baru</p>
        </a>
        <!-- Tambah pautan lain jika perlu -->
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAVnzKkl-GtHziHbw6SAdfftVnFkM5xm7E",
            authDomain: "barcode-2591e.firebaseapp.com",
            projectId: "barcode-2591e",
            storageBucket: "barcode-2591e.firebasestorage.app",
            messagingSenderId: "206115727840",
            appId: "1:206115727840:web:79c3b16d866782397ba385"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        if (!sessionStorage.getItem('loggedIn')) {
            window.location.href = 'login.html';
        }
        const role = sessionStorage.getItem('role');
        if (role !== 'admin') {
            window.location.href = 'lecturer_dashboard.html';
        }

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await auth.signOut();
            sessionStorage.clear();
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
